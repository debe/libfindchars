[constraints]
max_cycles = 0           # No circular dependencies — already perfect (acyclicity=10000)
max_cc = 25              # Max cyclomatic complexity per function
max_fn_lines = 100       # Max function length in lines
no_god_files = false     # Allow for now — Utf8EngineTemplate and LiteralCompiler are large by design

[[layers]]
name = "api"
paths = ["java/libfindchars-api/src/main/java/**/*"]
order = 0

[[layers]]
name = "csv"
paths = ["java/libfindchars-csv/src/main/java/**/*"]
order = 1

[[layers]]
name = "compiler"
paths = ["java/libfindchars-compiler/src/main/java/**/*"]
order = 1

[[layers]]
name = "examples"
paths = ["java/libfindchars-examples/src/main/java/**/*"]
order = 4

[[layers]]
name = "bench"
paths = ["java/libfindchars-bench/src/main/java/**/*"]
order = 4

# API is foundational — examples/bench must not leak back into it
[[boundaries]]
from = "java/libfindchars-api/src/main/java/**/*"
to = "java/libfindchars-compiler/src/main/java/**/*"
reason = "API must not depend on compiler — dependency flows compiler -> api only"

[[boundaries]]
from = "java/libfindchars-api/src/main/java/**/*"
to = "java/libfindchars-examples/src/main/java/**/*"
reason = "API must not depend on examples"

[[boundaries]]
from = "java/libfindchars-api/src/main/java/**/*"
to = "java/libfindchars-bench/src/main/java/**/*"
reason = "API must not depend on bench"

# Compiler must not depend on examples or bench
[[boundaries]]
from = "java/libfindchars-compiler/src/main/java/**/*"
to = "java/libfindchars-examples/src/main/java/**/*"
reason = "Compiler must not depend on examples"

[[boundaries]]
from = "java/libfindchars-compiler/src/main/java/**/*"
to = "java/libfindchars-bench/src/main/java/**/*"
reason = "Compiler must not depend on bench"

# Examples and bench must not depend on each other
[[boundaries]]
from = "java/libfindchars-examples/src/main/java/**/*"
to = "java/libfindchars-bench/src/main/java/**/*"
reason = "Examples must not depend on bench"

[[boundaries]]
from = "java/libfindchars-bench/src/main/java/**/*"
to = "java/libfindchars-examples/src/main/java/**/*"
reason = "Bench must not depend on examples"
